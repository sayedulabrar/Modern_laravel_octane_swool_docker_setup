# docker-compose.override.yml
#
# Docker Compose automatically merges this file on top of docker-compose.yml
# in LOCAL development. It is NOT used in production (CI/CD should run with
# `docker compose -f docker-compose.yml up` explicitly).
#
# What this adds:
#   - Source code bind-mounted so changes reflect without rebuilding
#   - Octane --watch flag (auto-reloads workers when PHP files change)
#   - APP_DEBUG=true and LOG_LEVEL=debug
#   - Xdebug extension (uncomment to enable)

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV:   local
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      OCTANE_MAX_REQUESTS: 9999   # don't recycle workers during dev
    volumes:
      # Bind-mount source so you can edit without rebuilding the image.
      # The vendor/ and storage/ dirs from the named volumes take precedence.
      - .:/var/www/html
      - app-storage:/var/www/html/storage
      - app-bootstrap:/var/www/html/bootstrap/cache
      # Exclude vendor from the bind-mount (use the image's compiled vendor)
      - /var/www/html/vendor
    command: >
      bash -c "
        php artisan octane:start
          --server=swoole
          --host=0.0.0.0
          --port=8000
          --watch
          --poll
      "
    # Override healthcheck to be more lenient during dev
    healthcheck:
      start_period: 90s

  # In dev, MySQL is accessible from host for tools like TablePlus / DBeaver
  mysql:
    ports:
      - "${DB_HOST_PORT:-33060}:3306"

  # Redis accessible from host for redis-cli or RedisInsight
  redis:
    ports:
      - "${REDIS_HOST_PORT:-63790}:6379"

# Uncomment to enable Xdebug (requires xdebug installed in the image).
# You'll need to add `RUN pecl install xdebug && docker-php-ext-enable xdebug`
# to the Dockerfile's php-base stage, then rebuild.
#
#   xdebug:
#     XDEBUG_MODE:   debug
#     XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003"
