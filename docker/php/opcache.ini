; docker/php/opcache.ini
; OPcache + JIT for maximum throughput in Octane workers.
;
; WHY THIS MATTERS FOR OCTANE:
;   In PHP-FPM, OPcache compiles each file on first access, then caches the
;   bytecode. In Octane, the app boots ONCE and stays in memory — OPcache
;   effectively caches the entire compiled application for the worker's lifetime.
;   Combined with JIT, CPU-bound code can run 2-5x faster than PHP-FPM.

[opcache]
opcache.enable     = 1
opcache.enable_cli = 1

; ── Cache size ──────────────────────────────────────────────────────────────────
; Laravel 11 + all vendor packages compile to roughly 60-80MB.
; 256MB gives plenty of headroom for your app code on top.
opcache.memory_consumption = 256

; Storage for interned strings (class names, function names, string literals).
; Increasing this reduces string duplication across workers.
opcache.interned_strings_buffer = 16

; Max number of PHP files that can be cached.
; `find vendor/ -name "*.php" | wc -l` gives you the actual count.
opcache.max_accelerated_files = 20000

; ── Timestamp validation ────────────────────────────────────────────────────────
; PRODUCTION: set to 0. PHP will NOT check if source files changed on disk.
; Files are compiled once at container build time. Revalidation is wasted I/O.
;
; DEVELOPMENT: the override compose uses --watch which restarts workers, so
; validation is not needed even in dev. Set to 1 only if you're NOT using --watch.
opcache.validate_timestamps = 0

; ── Misc ────────────────────────────────────────────────────────────────────────
; Required by annotations (Passport, Scribe, Doctrine, Spatie packages).
opcache.save_comments = 1

opcache.fast_shutdown = 1

; ── JIT ─────────────────────────────────────────────────────────────────────────
; PHP 8.x JIT compiles hot PHP bytecode to native machine code at runtime.
; Mode "function" JIT is the most stable and compatible option.
; Mode "tracing" (1255) is faster for CPU-bound loops but less compatible.
;
; Combined with Swoole's persistent workers, JIT provides substantial gains
; for computation-heavy code paths (report generation, data transforms, etc.)
opcache.jit = function
opcache.jit_buffer_size = 128M
