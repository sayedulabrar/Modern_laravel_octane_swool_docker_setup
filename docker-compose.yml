version: "3.9"

# ---------------------------------------------------------------------------
# Shared environment — referenced by app, queue, and scheduler services
# ---------------------------------------------------------------------------
x-app-env: &app-env
  APP_NAME:    ${APP_NAME:-LaravelOctane}
  APP_ENV:     ${APP_ENV:-production}
  APP_KEY:     ${APP_KEY}
  APP_DEBUG:   ${APP_DEBUG:-false}
  APP_URL:     ${APP_URL:-http://localhost}
  APP_LOCALE:  en

  LOG_CHANNEL:      stack
  LOG_LEVEL:        ${LOG_LEVEL:-error}

  DB_CONNECTION:  mysql
  DB_HOST:        mysql
  DB_PORT:        3306
  DB_DATABASE:    ${DB_DATABASE:-laravel}
  DB_USERNAME:    ${DB_USERNAME:-laravel}
  DB_PASSWORD:    ${DB_PASSWORD:-secret}

  REDIS_HOST:     redis
  REDIS_PORT:     6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_CLIENT:   predis   # predis is coroutine-safe; phpredis ext is NOT

  CACHE_STORE:         redis
  SESSION_DRIVER:      redis
  SESSION_LIFETIME:    120
  QUEUE_CONNECTION:    redis

  OCTANE_SERVER:       swoole
  OCTANE_HTTPS:        ${OCTANE_HTTPS:-false}
  OCTANE_MAX_REQUESTS: ${OCTANE_MAX_REQUESTS:-500}
  OCTANE_WORKERS:      ${OCTANE_WORKERS:-}
  OCTANE_TASK_WORKERS: ${OCTANE_TASK_WORKERS:-}

  MAIL_MAILER:      smtp
  MAIL_HOST:        mailpit
  MAIL_PORT:        1025
  MAIL_FROM_ADDRESS: ${MAIL_FROM:-noreply@example.com}
  MAIL_FROM_NAME:   ${APP_NAME:-LaravelOctane}

  AWS_ACCESS_KEY_ID:              ${MINIO_ACCESS_KEY:-minioadmin}
  AWS_SECRET_ACCESS_KEY:          ${MINIO_SECRET_KEY:-minioadmin}
  AWS_DEFAULT_REGION:             us-east-1
  AWS_BUCKET:                     ${AWS_BUCKET:-app-bucket}
  AWS_ENDPOINT:                   http://minio:9000
  AWS_USE_PATH_STYLE_ENDPOINT:    "true"
  FILESYSTEM_DISK:                s3

services:

  # ── Nginx — reverse proxy, serves static assets directly ──────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro          # static assets served by Nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  # ── App — Laravel Octane + Swoole ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-env
    volumes:
      - app-storage:/var/www/html/storage        # persistent logs, uploads, framework cache
      - app-bootstrap:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Queue worker ──────────────────────────────────────────────────────────
  # Separate container from app — no Swoole, plain PHP process.
  # Scale with: docker compose up -d --scale queue=4
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --sleep=3
      - --tries=3
      - --max-time=3600
      - --timeout=90
      - --memory=256
    environment:
      <<: *app-env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped
    deploy:
      replicas: ${QUEUE_WORKERS:-1}

  # ── Scheduler ─────────────────────────────────────────────────────────────
  # One instance, runs schedule:run every 60 seconds.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      bash -c "while true;
               do php artisan schedule:run --no-interaction;
               sleep 60; done"
    environment:
      <<: *app-env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${DB_DATABASE:-laravel}
      MYSQL_USER:          ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO — S3-compatible object storage ──────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"    # web console only; API via internal network
    networks:
      - app-net
    restart: unless-stopped

  # ── Mailpit — local SMTP + web inbox ──────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"           # web UI
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
  app-storage:
  app-bootstrap:
