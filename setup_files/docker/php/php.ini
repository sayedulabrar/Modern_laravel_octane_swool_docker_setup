; docker/php/php.ini
; PHP settings tuned for a long-running Swoole process.
;
; KEY DIFFERENCE vs PHP-FPM:
;   PHP-FPM spawns a fresh process per request — memory is reclaimed automatically.
;   Swoole workers run indefinitely — PHP settings that used to be per-request
;   safety limits (max_execution_time, memory_limit) now apply to the whole process.
;   We manage these differently with Octane's max_requests recycling instead.

; ── Memory ──────────────────────────────────────────────────────────────────────
; 512MB per worker. With 4 workers this is 2GB total — size your host accordingly.
; Individual request memory is controlled by your code, not this limit.
memory_limit = 512M

; ── Execution time ──────────────────────────────────────────────────────────────
; 0 = no limit. The Swoole worker process should never be killed by PHP's timer.
; Per-request timeouts are handled by Octane's Swoole settings.
max_execution_time = 0
max_input_time = -1

; ── File uploads ────────────────────────────────────────────────────────────────
upload_max_filesize = 100M
post_max_size = 105M
max_file_uploads = 20

; ── Error handling ──────────────────────────────────────────────────────────────
; Errors go to the log, not to the HTTP response.
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Realpath cache ──────────────────────────────────────────────────────────────
; A large realpath cache avoids repeated filesystem stat() calls across requests.
; Critical for performance in a persistent process handling thousands of requests.
realpath_cache_size = 4096K
realpath_cache_ttl  = 600

; ── Date ────────────────────────────────────────────────────────────────────────
date.timezone = UTC

; ── Swoole ──────────────────────────────────────────────────────────────────────
; Disable Swoole's short function aliases (go(), Co(), etc.).
; They pollute the global namespace and cause issues with some Laravel packages.
swoole.use_shortname = Off

; ── Session ─────────────────────────────────────────────────────────────────────
; Managed by Redis in this setup, but set a sane default anyway.
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_samesite = Lax
