# docker/nginx/default.conf
# Nginx reverse proxy for Laravel Octane (Swoole on port 8000).
#
# Traffic flow:
#   Client → Nginx :80 → [static files served here] OR → Octane :8000

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream octane {
    server app:8000;
    keepalive 64;    # reuse connections to Octane — big performance win
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;
    keepalive_timeout 65;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;

    # ── Static assets served directly by Nginx ────────────────────────────────
    # These never hit the PHP process. Nginx serves them from the bind-mounted
    # public/ directory with aggressive caching headers.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Vite build assets (Laravel's /build directory) ────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Health check — bypasses logging ──────────────────────────────────────
    location = /up {
        proxy_pass http://octane/up;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        access_log off;
    }

    # ── All other requests → Octane ───────────────────────────────────────────
    location / {
        proxy_pass         http://octane;
        proxy_http_version 1.1;

        # Headers Octane needs to reconstruct the original request
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (for Laravel Reverb / Echo Server)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts — generous for long-running requests (file uploads, reports)
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Don't buffer — stream responses directly to client
        proxy_buffering off;
    }

    # ── Block dotfiles ────────────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
}
